<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>Gerador de Orçamentos · miligrama design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f5f3ef; font-family: 'EB Garamond', Georgia, serif; color: #1a1a1a; }
    input, textarea, button { font-family: inherit; }

    button { cursor: pointer; }
    button:hover { opacity: 0.85; }

    .container { max-width: 900px; margin: 0 auto; padding: 48px 40px; min-height: 100vh; }

    .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 44px; padding-bottom: 24px; border-bottom: 1px solid #1a1a1a; }
    h1 { font-size: 40px; font-weight: 400; font-style: italic; margin: 0; letter-spacing: -0.8px; line-height: 1; }
    .subtitulo { font-size: 11px; color: #888; margin: 8px 0 0 0; text-transform: uppercase; letter-spacing: 2.5px; font-family: 'JetBrains Mono', monospace; }
    h2 { font-size: 26px; font-style: italic; font-weight: 400; margin: 0; letter-spacing: -0.3px; }

    .header-right { display: flex; gap: 16px; align-items: flex-end; }
    .contador-box { display: flex; flex-direction: column; align-items: flex-end; padding-right: 20px; border-right: 1px solid #ccc; }
    .contador-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 2px; font-family: 'JetBrains Mono', monospace; margin-bottom: 2px; }
    .contador-num { font-size: 20px; font-family: 'JetBrains Mono', monospace; font-weight: 500; }

    .secao { margin-bottom: 48px; }
    .secao-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; padding-bottom: 10px; border-bottom: 1px solid #1a1a1a; }

    label { display: block; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 8px; margin-top: 16px; font-family: 'JetBrains Mono', monospace; }
    input, textarea { width: 100%; padding: 11px 14px; border: 1px solid #d0ccc3; border-radius: 0; font-size: 15px; background: #fafaf7; color: #1a1a1a; transition: all 0.15s; }
    textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

    .cartao { padding: 28px; border: 1px solid #d0ccc3; margin-bottom: 18px; background: #fff; position: relative; }
    .cartao-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .cartao-num { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #999; letter-spacing: 2px; }

    .linha-campos { display: flex; gap: 18px; margin-bottom: 4px; }
    .linha-campos > div { flex: 1; }
    .linha-campos > .flex2 { flex: 2; }
    .linha-item { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }

    .btn-add { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid #1a1a1a; background: #fff; color: #1a1a1a; font-size: 11px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1.2px; }
    .btn-add-inline { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border: 1px dashed #aaa; background: transparent; color: #666; font-size: 10px; font-family: 'JetBrains Mono', monospace; }
    .btn-remover { border: none; background: transparent; color: #999; padding: 4px; }
    .btn-remover-icon { border: none; background: transparent; color: #ccc; padding: 6px; font-size: 14px; }
    .btn-secundario { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border: 1px solid #d0ccc3; background: #fff; color: #666; font-size: 11px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
    .btn-primario { display: inline-flex; align-items: center; gap: 8px; padding: 13px 26px; border: none; background: #1a1a1a; color: #fff; font-size: 12px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1.5px; }
    .btn-preview { display: inline-flex; align-items: center; gap: 8px; padding: 15px 32px; border: 1px solid #1a1a1a; background: #1a1a1a; color: #fff; font-size: 12px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1.5px; }
    .btn-link { border: none; background: none; color: #888; font-size: 11px; font-family: 'JetBrains Mono', monospace; text-decoration: underline; letter-spacing: 0.5px; }

    .rodape-acoes { display: flex; justify-content: flex-end; padding: 28px 0; border-top: 1px solid #1a1a1a; margin-top: 48px; }
    .seletor-exemplo { margin-bottom: 24px; text-align: right; }

    .aviso-erro { padding: 20px 22px; background: #fffbeb; border: 1px solid #d97706; margin-bottom: 24px; }
    .aviso-erro-titulo { font-size: 14px; color: #92400e; font-weight: 500; font-style: italic; }
    .aviso-erro-texto { font-size: 13px; color: #78350f; line-height: 1.55; margin: 4px 0 12px 0; }
    .aviso-erro-link { font-size: 11px; color: #92400e; text-decoration: underline; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; }
    .aviso-erro-fechar { border: none; background: transparent; color: #92400e; font-size: 22px; padding: 0; line-height: 1; }

    .preview-box { border: 1px solid #d0ccc3; background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,0.08); overflow: auto; }
    .proposta-pronta-box { text-align: center; padding: 60px 20px; border: 1px solid #d0ccc3; background: #fff; margin-bottom: 40px; }
    .selo { width: 56px; height: 56px; border-radius: 50%; background: #1a1a1a; color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 14px 10px; font-size: 10px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1.8px; color: #999; border-bottom: 1px solid #1a1a1a; }
    tr { border-bottom: 1px solid #e8e4dc; }
    td { padding: 14px 10px; font-size: 15px; }

    .doc-proposta-data { font-size: 9.5px; color: #555; font-family: 'JetBrains Mono', monospace; margin-top: 10px; }
    .doc-secao { margin-bottom: 32px; }
    .doc-secao-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2.8px; color: #999; font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; }
    .doc-cliente-nome { font-size: 28px; font-style: italic; font-weight: 400; margin-bottom: 10px; letter-spacing: -0.5px; line-height: 1.1; }
    .doc-apresentacao-txt { font-size: 12.5px; line-height: 1.6; color: #333; margin: 0; max-width: 82%; }
    .doc-servico { padding-top: 22px; padding-bottom: 22px; border-top: 1px solid #1a1a1a; }
    .doc-servico-header { display: grid; grid-template-columns: 32px 1fr auto auto; gap: 18px; align-items: baseline; margin-bottom: 10px; }
    .doc-servico-num { font-size: 10px; color: #999; font-family: 'JetBrains Mono', monospace; letter-spacing: 1.5px; }
    .doc-servico-titulo { font-size: 20px; font-style: italic; font-weight: 400; letter-spacing: -0.3px; }
    .doc-servico-prazo { font-size: 9.5px; color: #666; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1.2px; white-space: nowrap; }
    .doc-servico-valor { font-size: 15px; font-family: 'JetBrains Mono', monospace; font-weight: 500; white-space: nowrap; }
    .doc-servico-parcelas { color: #999; font-size: 10px; }
    .doc-servico-desc { font-size: 11px; color: #444; margin-left: 50px; margin-bottom: 14px; margin-top: 0; max-width: 85%; font-style: italic; }
    .doc-itens-lista { margin-left: 50px; }
    .doc-item { display: grid; grid-template-columns: 150px 1fr; gap: 16px; margin-bottom: 6px; font-size: 11px; align-items: baseline; }

    .doc-cronograma-linha { display: flex; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid #eee; font-size: 11px; }
    .doc-cronograma-etapa { color: #333; flex: 1; padding-right: 16px; }
    .doc-cronograma-duracao { color: #666; font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; white-space: nowrap; }
    .doc-observacoes { margin-top: 40px; padding-top: 22px; border-top: 1px solid #1a1a1a; }
    .doc-obs-bloco { margin-bottom: 18px; }
    .doc-obs-titulo { display: block; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 5px; font-weight: 500; }
    .doc-obs-txt { font-size: 10px; color: #555; line-height: 1.6; margin: 0; }
    .doc-rodape { margin-top: 50px; }
    .doc-assinatura-linha { border-bottom: 1px solid #1a1a1a; height: 32px; margin-bottom: 5px; }
    .doc-assinatura-label { font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 2.2px; font-family: 'JetBrains Mono', monospace; }

    /* ===== Impressão ===== */
    @media print {

      /* Tudo começa escondido */

        display: block !important;
        background: #fff !important;
        box-shadow: none !important;
        border: none !important;
        padding: 0 !important;
        margin: 0 !important;
        max-width: none !important;
        width: auto !important;
      }
      .pagina {
        box-shadow: none !important;
        border: none !important;
        margin: 0 !important;
        width: 100% !important;
        min-height: auto !important;
      }
    }
